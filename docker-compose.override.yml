# =============================================================================
# Local development overrides — merged automatically by Docker Compose.
# Replaces the published GHCR image with a locally-built image.
#
# Build first:  docker build -t the-moment:local . && THE_MOMENT_PORT=5002 docker compose up -d --force-recreate the-moment
# Then run:     THE_MOMENT_PORT=5002 docker compose up -d
# =============================================================================

services:
  the-moment:
    image: the-moment:local
