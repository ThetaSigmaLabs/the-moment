<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The Moment - The missing link between printers and filament inventory">
    <meta name="theme-color" content="#667eea">
    <title>The Moment Dashboard</title>
    <!-- External CSS Files -->
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/dropdowns.css">
    <link rel="stylesheet" href="/static/css/tabs.css">
    <link rel="stylesheet" href="/static/css/printers.css">
    <link rel="stylesheet" href="/static/css/nfc.css">
    <link rel="stylesheet" href="/static/css/modals.css">
    
    <!-- Preload critical JavaScript -->
    <link rel="preload" href="/static/js/main.js" as="script">
    <link rel="preload" href="/static/js/dropdowns.js" as="script">
</head>
<body data-spoolman-url="{{.SpoolmanBaseURL}}">
    <div class="container">
        <div class="header">
            <div style="display:flex;align-items:center;gap:14px;">
                <img src="/static/images/the-moment-logo.png" alt="The Moment"
                     style="height:52px;width:auto;flex-shrink:0;">
                <div>
                    <h1 style="margin:0;">The Moment Dashboard</h1>
                    <p style="margin:4px 0 0;opacity:0.75;font-size:0.9em;">
                        The missing link between printers, filament inventory, and cost
                        <span style="margin-left:10px;opacity:0.55;font-size:0.85em;letter-spacing:0.02em;">v{{.AppVersion}}</span>
                    </p>
                </div>
            </div>
            <a href="{{.SpoolmanBaseURL}}" target="_blank" rel="noopener" class="spoolman-header-btn">
                🧵 Spoolman
            </a>
        </div>
        
        <div class="content">
            <!-- Tab Navigation -->
            <ul class="tabs">
                <li><button class="tab {{if not .IsFirstRun}}active{{end}}" onclick="switchTab('history')">🗂️ Print History</button></li>
                <li><button class="tab {{if .IsFirstRun}}active{{end}}" onclick="switchTab('status')">🖨️ Print Ops</button></li>
                <li><button class="tab" onclick="switchTab('nfc')">📱 NFC Management</button></li>
                <li><button class="tab" onclick="switchTab('settings')">⚙️ Settings</button></li>
            </ul>
            
            {{template "content" .}}
        </div>
    </div>

    {{template "modals" .}}

    <!-- External JavaScript Files -->
    <script src="/static/js/main.js?v={{.AppVersion}}"></script>
    <script src="/static/js/history.js?v={{.AppVersion}}"></script>
    <script src="/static/js/cost-calculator.js?v={{.AppVersion}}"></script>
    <script src="/static/js/dropdowns.js?v={{.AppVersion}}"></script>
    <script src="/static/js/printers.js?v={{.AppVersion}}"></script>
    <script src="/static/js/websocket.js?v={{.AppVersion}}"></script>
    <script src="/static/js/nfc.js?v={{.AppVersion}}"></script>
</body>
</html>
