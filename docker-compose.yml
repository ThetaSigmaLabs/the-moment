# =============================================================================
# The Moment + Spoolman — Production LAN Stack
# =============================================================================
#
# Services:
#   spoolman    — Filament inventory database (port ${SPOOLMAN_PORT:-7912})
#   the-moment  — PrusaLink ↔ Spoolman bridge (port ${THE_MOMENT_PORT:-5000})
#
# Printer wiring:
#   Prusa CORE One L  → PrusaLink → The Moment → Spoolman
#   Ender 3 V3 SE     → Moonraker → Spoolman (native integration — no bridge needed)
#
# Ender 3 V3 SE setup:
#   In moonraker.conf add:
#     [spoolman]
#     server: http://<THIS-SERVER-IP>:${SPOOLMAN_PORT:-7912}
#     sync_rate: 5
#
# Usage:
#   docker compose up -d            # start
#   docker compose logs -f          # tail logs
#   docker compose pull && docker compose up -d   # update
#
# Access:
#   Spoolman:   http://<server-ip>:${SPOOLMAN_PORT:-7912}
#   The Moment: http://<server-ip>:${THE_MOMENT_PORT:-5000}
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Spoolman — filament inventory database
  # Natively integrates with Klipper/Moonraker (Ender 3 V3 SE)
  # The Moment also connects here for PrusaLink printers
  # ---------------------------------------------------------------------------
  spoolman:
    image: ghcr.io/donkie/spoolman:latest
    container_name: spoolman
    restart: unless-stopped
    ports:
      - "${SPOOLMAN_PORT:-7912}:8000"
    volumes:
      - spoolman-data:/home/spoolman/data
    environment:
      # Timezone — adjust to your local zone
      TZ: America/Halifax
      # Optional: enable debug logging
      # SPOOLMAN_LOGGING_LEVEL: DEBUG
    networks:
      - momentnet
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/info')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # The Moment — bridges PrusaLink printers to Spoolman
  # Handles: CORE One L (and any other PrusaLink-compatible printer)
  # ---------------------------------------------------------------------------
  the-moment:
    image: ghcr.io/maudy2u/the-moment:latest
    container_name: the-moment
    restart: unless-stopped
    depends_on:
      spoolman:
        condition: service_healthy
    ports:
      - "${THE_MOMENT_PORT:-5000}:${THE_MOMENT_PORT:-5000}"
    volumes:
      # Persistent SQLite database — stores printer configs, toolhead mappings,
      # print history, and NFC sessions
      - the-moment-data:/app/data
    environment:
      THE_MOMENT_PORT: ${THE_MOMENT_PORT:-5000}
      # Tell The Moment where the SQLite database lives inside the container
      THE_MOMENT_DB_PATH: /app/data

      # Point The Moment at the Spoolman service on the internal Docker network.
      # Uses the service name "spoolman" — Docker DNS resolves this automatically.
      # This env var is read at first-run config init; if you have already run
      # The Moment and configured it via the UI, this variable is ignored.
      SPOOLMAN_URL: http://spoolman:8000
    networks:
      - momentnet
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${THE_MOMENT_PORT:-5000}/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# =============================================================================
# Named volumes — data survives container restarts and upgrades
# =============================================================================
volumes:
  spoolman-data:
    driver: local
  the-moment-data:
    driver: local

# =============================================================================
# Internal network — services talk to each other without exposing ports
# =============================================================================
networks:
  momentnet:
    driver: bridge
